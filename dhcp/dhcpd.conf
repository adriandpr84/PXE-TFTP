# Configuracion del servidor DHCP para la demo

option domain-name "pxe.local";
option domain-name-servers 8.8.8.8, 8.8.4.4;
default-lease-time 600;
max-lease-time 7200;
ddns-update-style none;
authoritative;

# Subred PXE
subnet 192.168.1.0 netmask 255.255.255.0 {
  range 192.168.1.100 192.168.1.254;
  option subnet-mask 255.255.255.0;
  option routers 192.168.1.1;

  # Servidor PXE y bootfile
  next-server 192.168.1.10;
  filename "pxelinux.0";

  # Nodos con IP fija según MAC y hooks de eventos
  host nodo1 {
    hardware ethernet 12:34:56:78:90:AB;
    fixed-address 192.168.1.50;
    on commit {
      execute(
        "/etc/dhcp/events/notify.sh",
        "dhcp_commit",
        binary-to-ascii(10, 8, ".", leased-address),
        binary-to-ascii(16, 8, ":", substring(hardware, 1, 6)),
        host-decl-name
      );
    }
  }

  host nodo2 {
    hardware ethernet 12:34:56:78:90:BA;
    fixed-address 192.168.1.51;
    on commit {
      execute(
        "/etc/dhcp/events/notify.sh",
        "dhcp_commit",
        binary-to-ascii(10, 8, ".", leased-address),
        binary-to-ascii(16, 8, ":", substring(hardware, 1, 6)),
        host-decl-name
      );
    }
  }
}
